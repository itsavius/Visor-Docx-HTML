<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Document Viewer v5</title>

  <!-- Local dependencies -->
  <script src="DocxHtml2Canvas/jszip.min.js"></script>
  <script src="DocxHtml2Canvas/docx-preview.js"></script>
  <script src="DocxHtml2Canvas/html2canvas.min.js"></script>

  <style>
    /* ── Reset & base ─────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0f1016;
      background-attachment: fixed;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }

    /* ── Floating Controls (Windows 11 Acrylic Effect) ──────────────── */
    #nav-group {
      position: absolute;
      top: 10px;
      right: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 50px;

      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.88);
      border-top: 1px solid rgba(255, 255, 255, 0.66);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 1000;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.61);
      color: #0078d4;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      outline: none;
    }

    .nav-btn:hover:not(:disabled) {
      background: rgba(85, 85, 85, 0.19);
      transform: scale(1.05);
    }

    .nav-btn:active:not(:disabled) {
      background: rgba(85, 85, 85, 0.18);
      transform: scale(0.95);
    }

    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    #page-display {
      font-size: 0.95rem;
      font-weight: 600;
      color: #0078d4;
      white-space: nowrap;
      min-width: 75px;
      text-align: center;
      margin: 0 8px;
      user-select: none;
    }

    /* ── Viewer area ───────────────────────── */
    #viewer-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      margin: 1%;
      gap: 8px;
      position: relative;
    }

    /* ── Document frame ───────────────────────────────────── */
    #doc-frame {
      flex: 1 1 auto;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1px;
      margin: 1px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
      position: relative;
    }

    #doc-frame::-webkit-scrollbar { width: 8px; }
    #doc-frame::-webkit-scrollbar-track { background: transparent; border-radius: 4px; }
    #doc-frame::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }

    /* Canvas pages generated by html2canvas */
    .page-canvas {
      display: none;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      margin-bottom: 0;
      transform-origin: center center;
    }

    .page-canvas.active-page {
      display: block;
    }

    /* ── Vertical page-nav scrollbar ─────────────────────── */
    #page-scrollbar {
      flex-shrink: 0;
      width: 14px;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
      position: relative;
      user-select: none;
    }

    #page-scrollbar-thumb {
      position: absolute;
      left: 2px;
      right: 2px;
      border-radius: 5px;
      background: #d5d5d5;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      transition: background 0.15s, box-shadow 0.15s;
      cursor: grab;
      min-height: 20px;
    }

    #page-scrollbar-thumb:active {
      cursor: grabbing;
      background: #ffffff;
      box-shadow: 0 0 14px rgba(255, 255, 255, 0.8);
    }

    .page-tick {
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      pointer-events: none;
    }

    #status-msg {
      margin: auto;
      font-size: 1rem;
      color: #fff;
      text-align: center;
      opacity: 0.8;
      z-index: 10;
    }

    /* ── Offscreen render area (docxjs renders here before canvas capture) */
    #render-container {
      position: absolute;
      left: -9999px;
      top: 0;
      z-index: -1000;
      opacity: 0;
      pointer-events: none;
    }

    @media print {
      body { overflow: visible; background: #fff; }
      #nav-group, #page-scrollbar { display: none; }
      #doc-frame { margin: 0; overflow: visible; }
      .page-canvas {
        display: block !important;
        page-break-after: always;
        transform: none !important;
        margin-bottom: 0 !important;
        max-width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>

  <!-- Viewer area -->
  <div id="viewer-area">
    <div id="doc-frame">
      <p id="status-msg">Loading document…</p>
    </div>
    <div id="page-scrollbar" title="Drag to navigate pages">
      <div id="page-scrollbar-thumb"></div>
    </div>

    <!-- Floating Controls -->
    <div id="nav-group">
      <span id="page-display">— / —</span>
      <button class="nav-btn" id="btn-prev" title="Previous page" disabled>&#8249;</button>
      <button class="nav-btn" id="btn-next" title="Next page" disabled>&#8250;</button>
    </div>
  </div>

  <!-- Offscreen render container for docxjs output -->
  <div id="render-container"></div>

  <script>
    /* ═══════════════════════════════════════════════════════
       Config
       ═══════════════════════════════════════════════════════ */
    const FILENAME = 'Ejemplo.docx';

    /* ── State ────────────────────────────────────────────── */
    let pages = [];
    let currentPage = 0;

    /* ── DOM refs ─────────────────────────────────────────── */
    const docFrame         = document.getElementById('doc-frame');
    const renderContainer  = document.getElementById('render-container');
    const pageDisplay      = document.getElementById('page-display');
    const btnPrev          = document.getElementById('btn-prev');
    const btnNext          = document.getElementById('btn-next');
    const statusMsg        = document.getElementById('status-msg');
    const pageScroll       = document.getElementById('page-scrollbar');
    const pageThumb        = document.getElementById('page-scrollbar-thumb');

    /* ── Navigation ───────────────────────────────────────── */
    function showPage(index) {
      if (!pages.length) return;
      pages.forEach(p => p.classList.remove('active-page'));
      currentPage = Math.max(0, Math.min(index, pages.length - 1));
      pages[currentPage].classList.add('active-page');
      docFrame.scrollTop = 0;
      pageDisplay.textContent = `Page ${currentPage + 1} / ${pages.length}`;
      btnPrev.disabled = currentPage === 0;
      btnNext.disabled = currentPage === pages.length - 1;
      fitPageToFrame();
      syncScrollbar();
    }

    /* ── Fit canvas to frame ──────────────────────────────── */
    function fitPageToFrame() {
      if (!pages.length) return;
      const page   = pages[currentPage];
      const frameW = docFrame.clientWidth  - 2;
      const frameH = docFrame.clientHeight - 2;
      const pageW  = page.width  || 1;
      const pageH  = page.height || 1;
      const scale  = Math.min(frameW / pageW, frameH / pageH);
      page.style.width  = (pageW * scale) + 'px';
      page.style.height = (pageH * scale) + 'px';
    }

    let roTimer;
    const observer = new ResizeObserver(() => {
      clearTimeout(roTimer);
      roTimer = setTimeout(fitPageToFrame, 40);
    });
    observer.observe(docFrame);

    /* ── Vertical scrollbar ───────────────────────────────── */
    function syncScrollbar() {
      if (!pages.length) return;
      const trackH = pageScroll.clientHeight;
      const thumbH = Math.max(20, trackH / (pages.length || 1));
      const travel = trackH - thumbH;
      const top    = pages.length > 1 ? (currentPage / (pages.length - 1)) * travel : 0;
      pageThumb.style.height = thumbH + 'px';
      pageThumb.style.top    = top + 'px';
    }

    function buildScrollbarTicks() {
      pageScroll.querySelectorAll('.page-tick').forEach(t => t.remove());
      if (pages.length < 2) return;
      for (let i = 1; i < pages.length; i++) {
        const tick = document.createElement('div');
        tick.className = 'page-tick';
        tick.style.top = `${(i / pages.length) * 100}%`;
        pageScroll.appendChild(tick);
      }
    }

    pageScroll.addEventListener('click', (e) => {
      if (e.target === pageThumb) return;
      const rect  = pageScroll.getBoundingClientRect();
      const ratio = (e.clientY - rect.top) / rect.height;
      showPage(Math.round(ratio * (pages.length - 1)));
    });

    pageThumb.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      pageThumb.setPointerCapture(e.pointerId);
      const startY    = e.clientY;
      const trackH    = pageScroll.clientHeight;
      const travel    = trackH - pageThumb.offsetHeight;
      const startPage = currentPage;

      function onMove(ev) {
        const delta  = ev.clientY - startY;
        const ratio  = pages.length > 1 ? delta / travel : 0;
        const target = Math.round(startPage + ratio * (pages.length - 1));
        if (target !== currentPage) showPage(target);
      }
      pageThumb.addEventListener('pointermove', onMove);
      pageThumb.addEventListener('pointerup', () => {
        pageThumb.removeEventListener('pointermove', onMove);
      }, { once: true });
    });

    pageScroll.addEventListener('wheel', (e) => {
      e.preventDefault();
      showPage(currentPage + (e.deltaY > 0 ? 1 : -1));
    }, { passive: false });

    /* ── Touch panning ────────────────────────────────────── */
    let isTouchPanning = false, touchPanStartY = 0, touchPanStartPage = 0;

    docFrame.addEventListener('touchstart', (e) => {
      if (e.touches.length === 1) {
        isTouchPanning    = true;
        touchPanStartY    = e.touches[0].clientY;
        touchPanStartPage = currentPage;
      }
    }, { passive: true });

    docFrame.addEventListener('touchmove', (e) => {
      if (!isTouchPanning || !pages.length) return;
      const deltaY    = touchPanStartY - e.touches[0].clientY;
      const pageDelta = Math.round(deltaY / 100);
      const target    = Math.max(0, Math.min(touchPanStartPage + pageDelta, pages.length - 1));
      if (target !== currentPage) showPage(target);
    }, { passive: true });

    docFrame.addEventListener('touchend', () => { isTouchPanning = false; }, { passive: true });

    /* ── Button & keyboard events ─────────────────────────── */
    btnPrev.addEventListener('click', () => showPage(currentPage - 1));
    btnNext.addEventListener('click', () => showPage(currentPage + 1));

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') showPage(currentPage + 1);
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   showPage(currentPage - 1);
    });

    /* ═══════════════════════════════════════════════════════
       Core: Load DOCX → Render HTML → Capture pages to Canvas
       ═══════════════════════════════════════════════════════ */
    async function loadDocument() {
      try {
        /* 1. Fetch the docx file */
        const response = await fetch(FILENAME);
        if (!response.ok) throw new Error(`HTTP ${response.status} – ${response.statusText}`);
        const arrayBuffer = await response.arrayBuffer();

        statusMsg.textContent = 'Rendering document…';

        /* 2. Render with docx-preview into the offscreen container.
              breakPages:true  → each page is wrapped in a separate <article class="docx"> */
        const docxOptions = Object.assign(docx.defaultOptions, {
          className:    'docx',
          inWrapper:    false,
          experimental: true,
          debug:        false,
          useBase64URL: true,
        });

        await docx.renderAsync(arrayBuffer, renderContainer, null, docxOptions);

        /* 3. Collect the individual page elements */
        const pageElements = Array.from(renderContainer.querySelectorAll('.docx'));

        if (!pageElements.length) {
          statusMsg.textContent = 'No pages found in the document.';
          return;
        }

        statusMsg.textContent = 'Converting to canvas…';

        /* 4. Capture each page with html2canvas */
        for (let i = 0; i < pageElements.length; i++) {
          statusMsg.textContent = `Converting page ${i + 1} / ${pageElements.length}…`;

          const pageEl = pageElements[i];

          /* Make the element momentarily visible so html2canvas can measure it */
          pageEl.style.display = 'block';

          const canvas = await html2canvas(pageEl, {
            scale:           2,          // retina-quality
            useCORS:         true,
            logging:         false,
            backgroundColor: '#ffffff',
            removeContainer: false,
          });

          canvas.className = 'page-canvas';
          docFrame.appendChild(canvas);
          pages.push(canvas);
        }

        /* 5. Clean up offscreen container */
        renderContainer.remove();

        /* 6. Build UI and show first page */
        statusMsg.remove();
        buildScrollbarTicks();
        showPage(0);

      } catch (err) {
        statusMsg.textContent = `⚠ Could not load "${FILENAME}": ${err.message}`;
        console.error(err);
        pageDisplay.textContent = '— / —';
      }
    }

    loadDocument();
  </script>
</body>

</html>
